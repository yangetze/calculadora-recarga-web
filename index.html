<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Recarga Telefónica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📱 Calculadora de Recarga Telefónica</h1>
        <p>Ingresa tu renta actual para encontrar la combinación óptima de recarga.</p>

        <div class="input-group">
            <label for="companiaTelefonica">1. Selecciona tu compañía telefónica:</label>
            <div class="compania-selector">
                <img id="logoCompania" src="movistar-logo.svg" alt="Logo Movistar" class="logo-operadora">
                <select id="companiaTelefonica">
                    <option value="movistar">Movistar</option>
                    <option value="digitel">Digitel</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label for="rentaActual">2. Renta actual (Bs.):</label>
            <input type="number" id="rentaActual" value="1119.83" step="0.01" min="0.01" max="100000">
        </div>

        <div class="fixed-montos">
            <label>3. Montos de recarga disponibles:</label>
            <div id="montosFijosDisplay">
                </div>
        </div>

        <button id="calcularBtn">✨ Calcular Recarga Óptima</button>

        <div id="resultados" class="resultados">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
